services:
  deepwiki:
    build: .
    ports:
      - "8080:8080"
      - "3001:3001"
    environment:
      - MCP_HTTP=true
    volumes:
      - data:/home/deepwiki/app/data
      - claude-config:/home/deepwiki/.claude
    env_file:
      - .env.docker
    restart: unless-stopped

volumes:
  data:
  claude-config:
