services:
  deepwiki:
    build: .
    network_mode: host
    environment:
      - MCP_HTTP=true
    volumes:
      - data:/home/deepwiki/app/data
      - claude-config:/home/deepwiki/.claude
      - codex-config:/home/deepwiki/.codex
    env_file:
      - .env.docker
    restart: unless-stopped

volumes:
  data:
  claude-config:
  codex-config:
